service: shokri-portfolio

provider:
  name: aws
  runtime: nodejs14.x
  stage: dev
  region: eu-central-1
  memorySize: 128
  iamRoleStatements:
    - Effect: Allow
      Action: 'ses:SendEmail'
      Resource:
        - 'arn:aws:ses:eu-central-1:906970155596:identity/noreply@shokri.dev'
functions:
  api:
    handler: index.handler
    architecture: arm64
    events:
      - http:
          path: /
          method: ANY
          cors: true
      - http:
          path: /{proxy+}
          method: ANY
          cors: true
